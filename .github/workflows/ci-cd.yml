
GitHub Actions only accepts pure YAML code.

Use this cleaned working workflow in `.github/workflows/ci-cd.yml`:

yaml
name: Jerney DevSecOps Pipeline

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

env:
  DOCKER_REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/jerney-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/jerney-frontend

jobs:

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm ci

      - name: Run ESLint
        working-directory: ${{ matrix.component }}
        run: npm run lint || true

  sca:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm ci

      - name: Run npm audit
        working-directory: ${{ matrix.component }}
        run: npm audit --audit-level=critical || true

  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.component }}/Dockerfile
          failure-threshold: error

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    needs:
      - sca
      - dockerfile-lint

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/jerney-${{ matrix.component }}:latest
            ghcr.io/${{ github.repository }}/jerney-${{ matrix.component }}:${{ github.sha }}

  image-scan:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - name: Run Trivy Scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/jerney-${{ matrix.component }}:latest
          format: table
          exit-code: 0
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

  update-manifest:
    name: Update Kubernetes Manifest
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main'

    needs:
      - build
      - image-scan

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update image tags
        run: |
          sed -i "s|image: .*jerney-backend:.*|image: ${BACKEND_IMAGE}:${GITHUB_SHA}|" k8s/jerney.yaml
          sed -i "s|image: .*jerney-frontend:.*|image: ${FRONTEND_IMAGE}:${GITHUB_SHA}|" k8s/jerney.yaml

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/jerney.yaml

          git diff --cached --quiet || git commit -m "ci: update k8s images [skip ci]"

          git pull --rebase origin main

          git push origin main